# OpenPulse - Docker Compose (Local/Lightweight)
# Usage: docker compose up -d

services:
  openpulse:
    build: .
    container_name: openpulse
    ports:
      - "8000:8000"
    volumes:
      - openpulse_data:/data
    environment:
      - OPENPULSE_DATA_DIR=/data
      - OPENPULSE_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openpulse_data:
